# VYRA — API + Flutter Web on one domain (HTTPS via Certbot)
# Replace YOUR_DOMAIN and paths, then:
#   sudo cp nginx-full.conf /etc/nginx/sites-available/vyra
#   sudo ln -s /etc/nginx/sites-available/vyra /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

upstream vyra_api {
    server 127.0.0.1:5000;
}

server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;
    client_max_body_size 50M;

    # Flutter web (flutter build web)
    root /var/www/vyra/web;
    index index.html;

    location /api/ {
        proxy_pass http://vyra_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://vyra_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
